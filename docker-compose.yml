services:
  postgres:
    image: postgres:16
    container_name: identity_detection_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change-me
      POSTGRES_DB: identity_detection
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: identity_detection_backend
    environment:
      DATABASE_URL: postgresql://postgres:change-me@db:5432/identity_detection
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: identity_detection_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: