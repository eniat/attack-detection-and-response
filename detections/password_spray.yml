id: DET-001
name: Password Spray Attack
description: Detects one source IP generating failed login attempts against many users.
severity: High
mitre:
  tactic: Credential Access
  technique_id: T1110.003
  technique_name: Password Spraying
logic:
  min_failed_attempts: 20
  min_unique_users: 10
  window_minutes: 60
evidence:
  - source_ip
  - failed_login_count
  - unique_users_targeted
  - first_seen
  - last_seen
recommended_actions:
  - Review successful logins from the same source IP.
  - Check whether any targeted accounts later authenticated successfully.
  - Confirm MFA status for targeted users.
  - Block or investigate the source IP.
false_positives:
  - SSO outage
  - Misconfigured service account
  - Corporate VPN authentication issue