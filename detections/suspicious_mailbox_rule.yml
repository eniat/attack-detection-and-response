id: DET-006
name: Suspicious Mailbox Forwarding Rule
description: Detects inbox rules that forward emails externally.
severity: Critical
mitre:
  tactic: Collection
  technique_id: T1114
  technique_name: Email Collection
logic:
  operation: New-InboxRule
  suspicious_fields:
    - forward_to
    - redirect_to
    - forward_as_attachment_to
  require_external_recipient: true
  internal_domains_source: INTERNAL_DOMAINS environment variable
recommended_actions:
  - Disable the suspicious inbox rule.
  - Review mailbox access logs.
  - Revoke active sessions.
  - Reset user credentials.
  - Search for similar rules across other mailboxes.
false_positives:
  - User-created legitimate forwarding rule
  - Approved mailbox delegation workflow